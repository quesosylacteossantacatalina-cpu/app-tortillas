<body>

<!-- CARRITO -->
<div class="cart-floating" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart-box" id="cartBox">
<h3>Pedido</h3>
<div id="cart"></div>
<h3>Total ₡<span id="total">0</span></h3>

<input id="nombre" placeholder="Tu nombre">
<input id="correo" placeholder="Correo">

<a class="btn" href="#" onclick="enviarPedido()">Pedir por WhatsApp</a>
</div>

<script>

var carrito=[];

document.addEventListener("click",function(e){
if(e.target.classList.contains("add")){
e.preventDefault();

var n=e.target.dataset.n;
var p=parseInt(e.target.dataset.p);

var existe=carrito.find(x=>x.nombre===n);

if(existe){
existe.cantidad++;
}else{
carrito.push({nombre:n,precio:p,cantidad:1});
}

render();
}
});

function render(){
var total=0;
var count=0;
var html="";

carrito.forEach((p,i)=>{
total+=p.precio*p.cantidad;
count+=p.cantidad;

html+=`
<div>
${p.nombre} x${p.cantidad} ₡${p.precio*p.cantidad}
<button onclick="eliminar(${i})">❌</button>
</div>
`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;
}

function eliminar(i){
carrito.splice(i,1);
render();
}

function toggleCart(){
var c=document.getElementById("cartBox");
c.style.display=c.style.display==="block"?"none":"block";
}

function enviarPedido(){

var nombre=document.getElementById("nombre").value;
var correo=document.getElementById("correo").value;

if(!nombre || !correo){
alert("Completá tus datos");
return;
}

var msg="Pedido:%0A";

carrito.forEach(p=>{
msg+=p.nombre+" x"+p.cantidad+" ₡"+(p.precio*p.cantidad)+"%0A";
});

msg+="Total ₡"+document.getElementById("total").innerText;

window.open("https://wa.me/50670961571?text="+msg);
}

</script>
